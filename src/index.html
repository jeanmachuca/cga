<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognitive Avatar</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="drive-vault.js"></script>
    <script src="js/face.js"></script>
</head>
<body>
    <div class="theme-toggle" onclick="toggleTheme()">&#9789;</div>
    <div class="container">
        <div id="welcomeScreen" class="welcome-screen">
            <h1 class="welcome-title">Cognitive Avatar</h1>
            <div class="welcome-language">
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="en" name="language" value="en" checked onchange="onLanguageChange()">
                        <label for="en">English</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="es" name="language" value="es" onchange="onLanguageChange()">
                        <label for="es">Spanish</label>
                    </div>
                </div>
            </div>
            <div class="auth-section">
                <div id="userDisplay" class="user-display"></div>
                <div id="loginContainer" class="login-container"></div>
            </div>
        </div>
        <div id="mainApp" class="hidden">
            <div class="avatar" id="avatar">
                <img src="img/avatar.png" alt="Avatar Closed Mouth" class="closed-mouth">
                <img src="img/avatar2.png" alt="Avatar Open Mouth" class="open-mouth">
            </div>
            <div class="camera-container" id="cameraContainer">
                <video id="cameraVideo" autoplay muted playsinline></video>
                <div id="cameraStatus" class="camera-status"></div>
                <div id="trainingProgress" class="training-progress"></div>
            </div>
            <div class="controls">
                <div id="configForm" class="config-form hidden">
                    <h3 id="configTitle">Configure Gemini</h3>
                    <input type="password" id="apiKey" placeholder="Gemini API Key">
                    <input type="text" id="geminiModel" placeholder="Model (e.g. gemini-3.5-flash)">
                    <input type="text" id="knowledgeBaseUrl" placeholder="Knowledge Base URL (optional)">
                    <button id="saveConfigBtn" onclick="saveConfig()">Save</button>
                    <p class="config-warning" id="configWarning"></p>
                </div>
                <textarea id="textToSpeak" placeholder="Type something or speak..."></textarea>
                <div class="button-group">
                    <button class="mic-button" id="micButton" onclick="toggleListening()">&#127908;</button>
                </div>
                <div class="status-text" id="statusText"></div>
            </div>
        </div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
